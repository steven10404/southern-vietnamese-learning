    <main>
      <section class="section page-hero">
        <p class="eyebrow">Review Box</p>
        <h1 class="page-title">智慧複習箱</h1>
        <p>把詞句或單詞加入複習後，這裡會依熟悉度安排下一次複習。資料只存在你的本機瀏覽器。</p>
      </section>
      <section class="section section--tight">
        <div class="review-stats">
          <article class="panel stat-panel">
            <span class="stat" id="reviewTotalCount">0</span>
            <span class="stat-label">複習項目</span>
          </article>
          <article class="panel stat-panel">
            <span class="stat" id="reviewDueCount">0</span>
            <span class="stat-label">今日到期</span>
          </article>
          <article class="panel stat-panel">
            <span class="stat" id="reviewKnownCount">0</span>
            <span class="stat-label">已會</span>
          </article>
        </div>
        <div class="review-grid" id="reviewGrid"></div>
      </section>
    </main>

    <footer class="footer">
      <p>從詞句或單詞頁按「加入複習」後，會出現在這裡。按「會了」會延後下次複習；「還不熟」會留在今天。</p>
    </footer>
